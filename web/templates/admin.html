{{define "content"}}
<h2 class="text-2xl font-bold mb-4">Admin Panel</h2>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">

<div class="card bg-white shadow-sm border border-gray-100">
  <div class="card-body">
    <h3 class="card-title text-lg">Fixtures</h3>
    <p class="text-sm text-gray-600">Loaded: <strong>{{.FixtureCount}}</strong> fixtures</p>
    <form method="post" action="{{url "/admin/setup"}}">
      <button type="submit" class="btn btn-outline btn-sm w-full">Re-fetch all fixtures from API</button>
    </form>
    <div class="divider my-2"></div>
    <form method="post" action="{{url "/admin/score-all"}}">
      <button type="submit" class="btn btn-primary btn-sm w-full">Score all finished fixtures</button>
    </form>
    <form method="post" action="{{url "/admin/fetch-results"}}" class="mt-2">
      <button type="submit" class="btn btn-warning btn-sm w-full">⚡ Fetch results NOW from API</button>
    </form>
  </div>
</div>

<div class="card bg-white shadow-sm border border-gray-100">
  <div class="card-body">
    <h3 class="card-title text-lg">Points Config</h3>
    <form method="post" action="{{url "/admin/config"}}">
      <div class="grid grid-cols-2 gap-2 mb-2">
        <div class="form-control">
          <label class="label py-1"><span class="label-text text-xs">Exact score (X)</span></label>
          <input type="number" name="points_exact" min="0" class="input input-bordered input-sm" value="{{.PointsExact}}" />
        </div>
        <div class="form-control">
          <label class="label py-1"><span class="label-text text-xs">Correct outcome (Y)</span></label>
          <input type="number" name="points_outcome" min="0" class="input input-bordered input-sm" value="{{.PointsOutcome}}" />
        </div>
        <div class="form-control">
          <label class="label py-1"><span class="label-text text-xs">Group winner (G)</span></label>
          <input type="number" name="points_group" min="0" class="input input-bordered input-sm" value="{{.PointsGroup}}" />
        </div>
        <div class="form-control">
          <label class="label py-1"><span class="label-text text-xs">Tournament deadline</span></label>
          <input type="datetime-local" name="tournament_deadline" class="input input-bordered input-sm" value="{{.Deadline.Format "2006-01-02T15:04"}}" />
        </div>
      </div>
      <p class="text-xs font-semibold text-gray-500 mb-1 mt-1">Tournament placing points</p>
      <div class="grid grid-cols-2 gap-2 mb-3">
        <div class="form-control">
          <label class="label py-1"><span class="label-text text-xs">🥇 1st place</span></label>
          <input type="number" name="points_1st" min="0" class="input input-bordered input-sm" value="{{.Points1st}}" />
        </div>
        <div class="form-control">
          <label class="label py-1"><span class="label-text text-xs">🥈 2nd place</span></label>
          <input type="number" name="points_2nd" min="0" class="input input-bordered input-sm" value="{{.Points2nd}}" />
        </div>
        <div class="form-control">
          <label class="label py-1"><span class="label-text text-xs">🥉 3rd place</span></label>
          <input type="number" name="points_3rd" min="0" class="input input-bordered input-sm" value="{{.Points3rd}}" />
        </div>
        <div class="form-control">
          <label class="label py-1"><span class="label-text text-xs">⚽ Top scorer</span></label>
          <input type="number" name="points_scorer" min="0" class="input input-bordered input-sm" value="{{.PointsScorer}}" />
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-sm w-full">Save config</button>
    </form>
  </div>
</div>

</div>

<div class="card bg-white shadow-sm border border-gray-100">
  <div class="card-body">
    <h3 class="card-title text-lg">Tournament Scoring</h3>
    <p class="text-sm text-gray-600">Scorer candidates loaded: <strong>{{.ScorerCount}}</strong></p>
    <form method="post" action="{{url "/admin/refresh-scorers"}}">
      <button type="submit" class="btn btn-outline btn-sm">Refresh top scorers from API</button>
    </form>
    <div class="divider"></div>
    <p class="text-sm text-gray-500 mb-2">Set actual results and score all user bets in one click.</p>
    <form method="post" action="{{url "/admin/score-tournament"}}">
      <div class="grid grid-cols-1 xs:grid-cols-2 gap-3 mb-3">
        <div class="form-control">
          <label class="label py-1"><span class="label-text text-xs">🥇 Champion</span></label>
          <input type="text" name="champion" class="input input-bordered input-sm" placeholder="Team name" value="{{.TResults.Champion}}" />
        </div>
        <div class="form-control">
          <label class="label py-1"><span class="label-text text-xs">🥈 2nd Place</span></label>
          <input type="text" name="runner_up" class="input input-bordered input-sm" placeholder="Team name" value="{{.TResults.RunnerUp}}" />
        </div>
        <div class="form-control">
          <label class="label py-1"><span class="label-text text-xs">🥉 3rd Place</span></label>
          <input type="text" name="third_place" class="input input-bordered input-sm" placeholder="Team name" value="{{.TResults.ThirdPlace}}" />
        </div>
        <div class="form-control">
          <label class="label py-1"><span class="label-text text-xs">⚽ Top Scorer</span></label>
          <input type="text" name="top_scorer" class="input input-bordered input-sm" placeholder="Player name" value="{{.TResults.TopScorer}}" />
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-sm">Score all tournament bets</button>
    </form>
  </div>
</div>

{{end}}
