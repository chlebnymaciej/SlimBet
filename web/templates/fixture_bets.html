{{define "fixture_bets"}}
<div class="bets-panel bg-gray-50 rounded p-2 mt-1 border-t border-gray-100">
  {{if .}}
  <table class="table table-xs w-full">
    <thead>
      <tr><th>Player</th><th>Bet</th><th>Pts</th></tr>
    </thead>
    <tbody>
      {{range .}}
      <tr>
        <td><strong>{{.Username}}</strong></td>
        <td class="my-bet">{{.HomeScore}}–{{.AwayScore}}</td>
        <td>
          {{if .Points}}<span class="points-badge">{{deref .Points}}</span>
          {{else}}<span class="text-gray-400">—</span>{{end}}
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
  {{else}}
  <p class="text-gray-400 text-xs py-1 px-1">No bets placed yet.</p>
  {{end}}
</div>
{{end}}
