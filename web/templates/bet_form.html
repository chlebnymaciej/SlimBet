{{define "bet_form"}}
{{if .Error}}<p class="text-red-600 text-sm mb-2">{{.Error}}</p>{{end}}
{{if .IsBettable}}
<form hx-post="{{url (printf "/fixtures/%d/bet" .Fixture.ID)}}"
      hx-target="#fixture-{{.Fixture.ID}}"
      hx-swap="outerHTML"
      class="flex flex-col gap-2">
  <div class="flex gap-2 items-center">
    <input type="number" name="home_score" min="0" max="20"
      class="input input-bordered w-16 text-center font-bold text-lg"
      value="{{if .ExistingBet}}{{.ExistingBet.HomeScore}}{{else}}0{{end}}" required />
    <span class="text-gray-400 font-bold text-lg">–</span>
    <input type="number" name="away_score" min="0" max="20"
      class="input input-bordered w-16 text-center font-bold text-lg"
      value="{{if .ExistingBet}}{{.ExistingBet.AwayScore}}{{else}}0{{end}}" required />
  </div>
  {{if not .Fixture.Group}}
  <div>
    <label class="label py-1"><span class="label-text text-xs">Who advances if draw? <em class="text-gray-400">(optional, +5 pts)</em></span></label>
    <select name="advances_pick" class="select select-bordered select-sm w-full max-w-xs">
      <option value="">— no pick —</option>
      <option value="HOME"{{if and .ExistingBet (eq .ExistingBet.AdvancesPick "HOME")}} selected{{end}}>
        🏠 {{.Fixture.HomeTeam}}
      </option>
      <option value="AWAY"{{if and .ExistingBet (eq .ExistingBet.AdvancesPick "AWAY")}} selected{{end}}>
        ✈ {{.Fixture.AwayTeam}}
      </option>
    </select>
  </div>
  {{end}}
  <div class="flex gap-2">
    <button type="submit" class="btn btn-primary btn-sm">Save</button>
    <button type="button" class="btn btn-ghost btn-sm"
      onclick="document.getElementById('bet-{{.Fixture.ID}}').innerHTML = '{{if .ExistingBet}}<span class=\'my-bet\'>{{.ExistingBet.HomeScore}}–{{.ExistingBet.AwayScore}}</span>{{else}}<em class=\'text-gray-400 text-xs\'>No bet</em>{{end}}'">
      Cancel
    </button>
  </div>
</form>
{{else}}
<em class="text-gray-400 text-xs">Bet window closed.</em>
{{end}}
{{end}}
